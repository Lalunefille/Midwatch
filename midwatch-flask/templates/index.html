<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Midwatch</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #09090b;
      color: #f8fafc;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(99,102,241,0.25), transparent 36%),
        radial-gradient(circle at bottom right, rgba(244,114,182,0.12), transparent 34%),
        #09090b;
    }

    .app {
      height: 100dvh;
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: max(18px, env(safe-area-inset-top)) 16px max(12px, env(safe-area-inset-bottom));
    }

    .header {
      flex: 0 0 auto;
      padding-bottom: 14px;
    }

    .badge {
      display: inline-block;
      padding: 6px 11px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      color: #c4b5fd;
      background: rgba(255,255,255,0.04);
      font-size: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 13vw, 72px);
      letter-spacing: -0.06em;
      line-height: 0.95;
    }

    .subtitle {
      margin-top: 12px;
      color: #a1a1aa;
      font-size: 16px;
      line-height: 1.4;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #d4d4d8;
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
    }

    .chat-card {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 26px;
      background: rgba(9,9,11,0.72);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .messages {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 88%;
      padding: 13px 16px;
      border-radius: 20px;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-bottom-right-radius: 7px;
    }

    .midwatch {
      align-self: flex-start;
      background: rgba(39,39,42,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-left-radius: 7px;
    }

    .typing {
      flex: 0 0 auto;
      min-height: 24px;
      padding: 0 18px 8px;
      color: #a1a1aa;
      font-size: 13px;
    }

    .composer {
      flex: 0 0 auto;
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(24,24,27,0.85);
    }

    input {
      flex: 1;
      min-width: 0;
      background: #09090b;
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      padding: 14px 15px;
      border-radius: 18px;
      outline: none;
      font-size: 16px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 0 18px;
      font-weight: 700;
      background: #f8fafc;
      color: #09090b;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .app {
        padding-left: 12px;
        padding-right: 12px;
      }

      .badge {
        font-size: 11px;
      }

      .subtitle {
        font-size: 15px;
      }

      .chip {
        font-size: 12px;
        padding: 7px 10px;
      }

      .chat-card {
        border-radius: 22px;
      }

      .messages {
        padding: 14px;
      }

      .message {
        max-width: 92%;
      }

      .composer {
        padding: 10px;
      }

      button {
        padding: 0 15px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="header">
      <div class="badge">spoiler-aware movie night companion</div>
      <h1>Midwatch</h1>
      <div class="subtitle">For when you pause the episode and need to talk.</div>

      <div class="chips">
        <div class="chip" onclick="quickAsk('is this man lying or am i paranoid')">is this man lying?</div>
        <div class="chip" onclick="quickAsk('did i miss something or is this supposed to be unclear?')">did i miss something?</div>
        <div class="chip" onclick="quickAsk('recommend something for rainy-night emotional damage')">rainy-night recs</div>
      </div>
    </section>

    <section class="chat-card">
      <div id="messages" class="messages">
        <div class="message midwatch">okay first of all what are we watching 👀</div>
      </div>

      <div id="typing" class="typing"></div>

      <div class="composer">
        <input id="messageInput" type="text" placeholder="Suits, season 6..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </section>
  </main>

  <script>
    const messagesContainer = document.getElementById("messages");
    const input = document.getElementById("messageInput");
    const typing = document.getElementById("typing");

    let messages = [
      { role: "midwatch", text: "okay first of all what are we watching 👀" }
    ];

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function quickAsk(text) {
      input.value = text;
      input.focus();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      messages.push({ role: "user", text });
      addMessage("user", text);
      input.value = "";
      typing.textContent = "Midwatch is typing...";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages })
        });

        const data = await response.json();
        typing.textContent = "";

        const reply = data.reply || "okay wait something broke";
        messages.push({ role: "midwatch", text: reply });
        addMessage("midwatch", reply);
      } catch (err) {
        typing.textContent = "";
        addMessage("midwatch", "Midwatch is having trouble reaching the AI service right now.");
        console.error(err);
      }
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
