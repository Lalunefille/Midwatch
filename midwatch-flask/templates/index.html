<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Midwatch</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #09090b;
    }

    .message {
      unicode-bidi: plaintext;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .message.rtl {
      direction: rtl;
      text-align: right;
    }

    .message.ltr {
      direction: ltr;
      text-align: left;
    }

    .messages-scroll::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    input {
      direction: auto;
      unicode-bidi: plaintext;
      text-align: start;
    }
  </style>
</head>

<body
  class="min-h-screen bg-zinc-950 text-white"
>
  <div
    class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,rgba(99,102,241,0.25),transparent_35%),radial-gradient(circle_at_bottom_right,rgba(244,114,182,0.12),transparent_35%)]"
  ></div>

  <main
    class="mx-auto flex h-[100dvh] w-full max-w-[860px] flex-col px-3 pt-[max(16px,env(safe-area-inset-top))] pb-[max(12px,env(safe-area-inset-bottom))] sm:px-4"
  >
    <section class="shrink-0 pb-3">
      <div
        class="mb-3 inline-flex rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-xs text-violet-300"
      >
        spoiler-aware movie night companion
      </div>

      <h1
        class="text-[clamp(44px,12vw,72px)] font-bold leading-[0.92] tracking-[-0.07em]"
      >
        Midwatch
      </h1>

      <div class="mt-3 text-base leading-relaxed text-zinc-400">
        For when you pause the episode and need to talk.
      </div>

      <div class="mt-4 flex flex-wrap gap-2">
        <button
          onclick="newChat()"
          class="rounded-full border border-white/10 bg-white/5 px-3.5 py-2 text-sm font-medium text-zinc-200 hover:bg-white/10"
        >
          New chat
        </button>

        <button
          onclick="clearHistory()"
          class="rounded-full border border-white/10 bg-white/5 px-3.5 py-2 text-sm font-medium text-zinc-200 hover:bg-white/10"
        >
          Clear history
        </button>
      </div>

      <div class="mt-4 flex flex-wrap gap-2">
        <button
          onclick="quickAsk('is this man lying or am i paranoid')"
          class="rounded-full border border-white/10 bg-white/5 px-3 py-2 text-xs text-zinc-300 hover:bg-white/10"
        >
          is this man lying?
        </button>

        <button
          onclick="quickAsk('did i miss something or is this supposed to be unclear?')"
          class="rounded-full border border-white/10 bg-white/5 px-3 py-2 text-xs text-zinc-300 hover:bg-white/10"
        >
          did i miss something?
        </button>

        <button
          onclick="quickAsk('recommend something for rainy-night emotional damage')"
          class="rounded-full border border-white/10 bg-white/5 px-3 py-2 text-xs text-zinc-300 hover:bg-white/10"
        >
          rainy-night recs
        </button>
      </div>
    </section>

    <section
      class="flex min-h-0 flex-1 flex-col overflow-hidden rounded-[28px] border border-white/10 bg-zinc-950/70 backdrop-blur-xl"
    >
      <div
        id="messages"
        class="messages-scroll flex min-h-0 flex-1 flex-col gap-3 overflow-y-auto p-3.5 sm:p-4"
      ></div>

      <div
        id="typing"
        class="min-h-[24px] px-4 pb-2 text-xs text-zinc-400"
      ></div>

      <div
        class="flex gap-2.5 border-t border-white/10 bg-zinc-900/90 p-2.5 sm:p-3"
      >
        <input
          id="messageInput"
          type="text"
          placeholder="Suits, season 6..."
          class="min-w-0 flex-1 rounded-[18px] border border-white/10 bg-zinc-950 px-4 py-3.5 text-base text-white outline-none placeholder:text-zinc-500 focus:border-violet-400/70 focus:ring-4 focus:ring-violet-400/10"
        />

        <button
          onclick="sendMessage()"
          class="shrink-0 rounded-[18px] bg-zinc-50 px-4 font-bold text-zinc-950 hover:bg-white"
        >
          Send
        </button>
      </div>
    </section>
  </main>

  <script>
    const messagesContainer = document.getElementById("messages");
    const input = document.getElementById("messageInput");
    const typing = document.getElementById("typing");

    const starterMessage = {
      role: "midwatch",
      text: "okay first of all what are we watching 👀"
    };

    let messages = loadMessages();

    function loadMessages() {
      const saved = localStorage.getItem("midwatchMessages");

      if (!saved) {
        return [starterMessage];
      }

      try {
        const parsed = JSON.parse(saved);

        if (!Array.isArray(parsed) || parsed.length === 0) {
          return [starterMessage];
        }

        return parsed;
      } catch {
        return [starterMessage];
      }
    }

    function saveMessages() {
      localStorage.setItem("midwatchMessages", JSON.stringify(messages));
    }

    function isMostlyPersian(text) {
      const persianMatches = text.match(/[\u0600-\u06FF]/g) || [];
      const latinMatches = text.match(/[A-Za-z]/g) || [];

      return persianMatches.length > latinMatches.length;
    }

    function renderMessages() {
      messagesContainer.innerHTML = "";

      messages.forEach((message) => {
        const div = document.createElement("div");

        const directionClass = isMostlyPersian(message.text) ? "rtl" : "ltr";

        div.dir = directionClass === "rtl" ? "rtl" : "ltr";

        div.className = [
          "message",
          directionClass,
          "max-w-[88%]",
          "rounded-[22px]",
          "px-4",
          "py-3.5",
          "text-[15px]",
          "leading-relaxed",
          message.role === "user"
            ? "self-end rounded-br-lg bg-gradient-to-br from-indigo-500 to-violet-500 text-white"
            : "self-start rounded-bl-lg border border-white/10 bg-zinc-800/90 text-zinc-100"
        ].join(" ");

        div.textContent = message.text;

        messagesContainer.appendChild(div);
      });

      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addMessage(role, text) {
      messages.push({ role, text });
      saveMessages();
      renderMessages();
    }

    function newChat() {
      messages = [starterMessage];
      saveMessages();
      renderMessages();
      input.value = "";
      typing.textContent = "";
      input.focus();
    }

    function clearHistory() {
      localStorage.removeItem("midwatchMessages");
      messages = [starterMessage];
      renderMessages();
      input.value = "";
      typing.textContent = "";
      input.focus();
    }

    function quickAsk(text) {
      input.value = text;
      input.focus();
    }

    async function sendMessage() {
      const text = input.value.trim();

      if (!text) return;

      addMessage("user", text);

      input.value = "";
      typing.textContent = "Midwatch is typing...";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            messages
          })
        });

        const data = await response.json();

        typing.textContent = "";

        addMessage(
          "midwatch",
          data.reply || "okay wait something broke"
        );
      } catch (err) {
        typing.textContent = "";

        addMessage(
          "midwatch",
          "Midwatch is having trouble reaching the AI service right now."
        );

        console.error(err);
      }
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    renderMessages();
  </script>
</body>
</html>
