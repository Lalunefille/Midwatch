<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midwatch</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      color: #f8fafc;
      background:
        radial-gradient(circle at top left, rgba(99,102,241,0.25), transparent 35%),
        radial-gradient(circle at bottom right, rgba(244,114,182,0.14), transparent 35%),
        #09090b;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 28px 16px;
    }

    .app {
      width: 100%;
      max-width: 820px;
      height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      flex: 0 0 auto;
      margin-bottom: 22px;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      color: #c4b5fd;
      background: rgba(255,255,255,0.04);
      font-size: 13px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(40px, 7vw, 72px);
      letter-spacing: -0.06em;
      line-height: 0.95;
    }

    .subtitle {
      margin-top: 14px;
      color: #a1a1aa;
      font-size: 18px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .chip {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #d4d4d8;
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
    }

    .chip:hover {
      background: rgba(255,255,255,0.1);
    }

    .chat-card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 32px;
      background: rgba(9,9,11,0.72);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 90px rgba(0,0,0,0.45);
      overflow: hidden;
    }

    .messages {
      flex: 1;
      min-height: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      overscroll-behavior: contain;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 8px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
    }

    .message {
      max-width: 78%;
      padding: 14px 18px;
      border-radius: 22px;
      line-height: 1.55;
      white-space: pre-wrap;
      font-size: 15.5px;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border-bottom-right-radius: 7px;
    }

    .midwatch {
      align-self: flex-start;
      background: rgba(39,39,42,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f4f4f5;
      border-bottom-left-radius: 7px;
    }

    .typing {
      flex: 0 0 28px;
      padding: 0 24px;
      color: #a1a1aa;
      font-size: 14px;
    }

    .composer {
      flex: 0 0 auto;
      display: flex;
      gap: 12px;
      padding: 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(24,24,27,0.7);
    }

    input {
      flex: 1;
      min-width: 0;
      background: #09090b;
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      padding: 16px 18px;
      border-radius: 18px;
      outline: none;
      font-size: 15px;
    }

    input:focus {
      border-color: rgba(167,139,250,0.8);
      box-shadow: 0 0 0 4px rgba(167,139,250,0.12);
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 0 24px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      background: #f8fafc;
      color: #09090b;
      transition: transform 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .app {
        height: calc(100vh - 28px);
      }

      .header {
        margin-bottom: 14px;
      }

      .subtitle {
        font-size: 15px;
      }

      .chips {
        margin-top: 14px;
      }

      .message {
        max-width: 90%;
      }

      .composer {
        flex-direction: column;
      }

      button {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="header">
      <div class="badge">spoiler-aware movie night companion</div>
      <h1>Midwatch</h1>
      <div class="subtitle">
        For when you pause the episode and need to talk.
      </div>

      <div class="chips">
        <div class="chip" onclick="quickAsk('is this man lying or am i paranoid')">is this man lying?</div>
        <div class="chip" onclick="quickAsk('did i miss something or is this supposed to be unclear?')">did i miss something?</div>
        <div class="chip" onclick="quickAsk('recommend something for rainy-night emotional damage')">rainy-night recs</div>
      </div>
    </section>

    <section class="chat-card">
      <div id="messages" class="messages">
        <div class="message midwatch">
          okay first of all what are we watching 👀
        </div>
      </div>

      <div id="typing" class="typing"></div>

      <div class="composer">
        <input
          id="messageInput"
          type="text"
          placeholder="Suits, season 6... is everyone okay or is it just me?"
        />

        <button onclick="sendMessage()">Send</button>
      </div>
    </section>
  </main>

  <script>
    const messagesContainer = document.getElementById("messages");
    const input = document.getElementById("messageInput");
    const typing = document.getElementById("typing");

    let messages = [
      {
        role: "midwatch",
        text: "okay first of all what are we watching 👀"
      }
    ];

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function quickAsk(text) {
      input.value = text;
      input.focus();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      messages.push({ role: "user", text });
      addMessage("user", text);

      input.value = "";
      typing.textContent = "Midwatch is typing...";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages })
        });

        const data = await response.json();
        typing.textContent = "";

        const reply = data.reply || "okay wait something broke";
        messages.push({ role: "midwatch", text: reply });
        addMessage("midwatch", reply);

      } catch (err) {
        typing.textContent = "";
        addMessage("midwatch", "Midwatch is having trouble reaching the AI service right now.");
        console.error(err);
      }
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
