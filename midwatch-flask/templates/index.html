<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Midwatch</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #09090b;
      color: white;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.25), transparent 35%),
        radial-gradient(circle at bottom right, rgba(244, 114, 182, 0.12), transparent 35%),
        #09090b;
    }

    .app {
      width: 100%;
      max-width: 860px;
      height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding:
        max(16px, env(safe-area-inset-top))
        14px
        max(12px, env(safe-area-inset-bottom));
    }

    .header {
      flex-shrink: 0;
      padding-bottom: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #c4b5fd;
      font-size: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 12vw, 72px);
      line-height: 0.92;
      letter-spacing: -0.07em;
    }

    .subtitle {
      margin-top: 14px;
      color: #a1a1aa;
      font-size: 16px;
      line-height: 1.4;
    }

    .top-actions,
    .chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .top-btn,
    .chip {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e4e4e7;
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 13px;
      cursor: pointer;
    }

    .top-btn:hover,
    .chip:hover {
      background: rgba(255,255,255,0.1);
    }

    .chat-card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(9,9,11,0.72);
      backdrop-filter: blur(18px);
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .message-wrapper {
      display: flex;
      flex-direction: column;
    }

    .message-wrapper.user-wrap {
      align-items: flex-end;
    }

    .message-wrapper.midwatch-wrap {
      align-items: flex-start;
    }

    .message {
      max-width: 88%;
      padding: 14px 16px;
      border-radius: 22px;
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      unicode-bidi: plaintext;
    }

    .message.rtl {
      direction: rtl;
      text-align: right;
    }

    .message.ltr {
      direction: ltr;
      text-align: left;
    }

    .user {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-bottom-right-radius: 8px;
    }

    .midwatch {
      background: rgba(39,39,42,0.92);
      border: 1px solid rgba(255,255,255,0.06);
      border-bottom-left-radius: 8px;
    }

    .timestamp {
      margin-top: 4px;
      padding: 0 8px;
      color: #71717a;
      font-size: 11px;
    }

    .typing {
      min-height: 22px;
      padding: 0 18px 8px;
      color: #a1a1aa;
      font-size: 13px;
    }

    .composer {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(24,24,27,0.88);
    }

    textarea {
      flex: 1;
      min-width: 0;
      max-height: 140px;
      resize: none;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.1);
      background: #09090b;
      color: white;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
      direction: auto;
      unicode-bidi: plaintext;
      text-align: start;
      font-family: inherit;
      line-height: 1.4;
    }

    textarea::placeholder {
      color: #71717a;
    }

    .send-btn {
      border: none;
      border-radius: 18px;
      padding: 14px 18px;
      font-weight: 700;
      background: #f8fafc;
      color: #09090b;
      cursor: pointer;
      flex-shrink: 0;
    }

    .send-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    @media (max-width: 640px) {
      .app {
        padding-left: 10px;
        padding-right: 10px;
      }

      .subtitle {
        font-size: 15px;
      }

      .messages {
        padding: 14px;
      }

      .message {
        max-width: 92%;
      }

      .composer {
        padding: 10px;
      }

      .send-btn {
        padding: 14px 16px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="header">
      <div class="badge">spoiler-aware movie night companion</div>

      <h1>Midwatch</h1>

      <div class="subtitle">
        For when you pause the episode and need to talk.
      </div>

      <div class="top-actions">
        <button class="top-btn" onclick="newChat()">New chat</button>
        <button class="top-btn" onclick="clearHistory()">Clear history</button>
        <button class="top-btn" onclick="exportChat()">Export</button>
      </div>

      <div class="chips">
        <button class="chip" onclick="quickAsk('is this man lying or am i paranoid')">
          is this man lying?
        </button>

        <button class="chip" onclick="quickAsk('did i miss something or is this supposed to be unclear?')">
          did i miss something?
        </button>

        <button class="chip" onclick="quickAsk('recommend something for rainy-night emotional damage')">
          rainy-night recs
        </button>
      </div>
    </section>

    <section class="chat-card">
      <div id="messages" class="messages"></div>

      <div id="typing" class="typing"></div>

      <div class="composer">
        <textarea
          id="messageInput"
          rows="1"
          placeholder="Suits, season 6..."
        ></textarea>

        <button id="sendButton" class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "midwatchMessages";

    const messagesContainer = document.getElementById("messages");
    const input = document.getElementById("messageInput");
    const typing = document.getElementById("typing");
    const sendButton = document.getElementById("sendButton");

    const starterMessage = {
      role: "midwatch",
      text: "okay first of all what are we watching 👀",
      timestamp: new Date().toISOString()
    };

    let isLoading = false;
    let messages = loadMessages();

    function loadMessages() {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (!saved) {
        return [starterMessage];
      }

      try {
        const parsed = JSON.parse(saved);

        if (!Array.isArray(parsed) || parsed.length === 0) {
          return [starterMessage];
        }

        return parsed.map((message) => ({
          ...message,
          timestamp: message.timestamp || new Date().toISOString()
        }));
      } catch {
        return [starterMessage];
      }
    }

    function saveMessages() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    }

    function isMostlyPersian(text) {
      const persianMatches = text.match(/[\u0600-\u06FF]/g) || [];
      const latinMatches = text.match(/[A-Za-z]/g) || [];

      return persianMatches.length > latinMatches.length;
    }

    function formatTime(timestamp) {
      try {
        return new Intl.DateTimeFormat([], {
          hour: "2-digit",
          minute: "2-digit"
        }).format(new Date(timestamp));
      } catch {
        return "";
      }
    }

    function renderMessages() {
      messagesContainer.innerHTML = "";

      messages.forEach((message) => {
        const wrapper = document.createElement("div");

        wrapper.className =
          message.role === "user"
            ? "message-wrapper user-wrap"
            : "message-wrapper midwatch-wrap";

        const bubble = document.createElement("div");
        const directionClass = isMostlyPersian(message.text) ? "rtl" : "ltr";

        bubble.className = `message ${message.role} ${directionClass}`;
        bubble.dir = directionClass === "rtl" ? "rtl" : "ltr";
        bubble.textContent = message.text;

        const time = document.createElement("div");
        time.className = "timestamp";
        time.textContent = formatTime(message.timestamp);

        wrapper.appendChild(bubble);
        wrapper.appendChild(time);
        messagesContainer.appendChild(wrapper);
      });

      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addMessage(role, text) {
      messages.push({
        role,
        text,
        timestamp: new Date().toISOString()
      });

      saveMessages();
      renderMessages();
    }

    function setLoading(value) {
      isLoading = value;
      sendButton.disabled = value;
      input.disabled = value;
      typing.textContent = value ? "Midwatch is typing..." : "";
    }

    function autoResizeTextarea() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 140) + "px";
    }

    function newChat() {
      messages = [
        {
          role: "midwatch",
          text: "okay first of all what are we watching 👀",
          timestamp: new Date().toISOString()
        }
      ];

      saveMessages();
      renderMessages();
      input.value = "";
      autoResizeTextarea();
      setLoading(false);
      input.focus();
    }

    function clearHistory() {
      localStorage.removeItem(STORAGE_KEY);
      newChat();
    }

    function quickAsk(text) {
      input.value = text;
      autoResizeTextarea();
      input.focus();
    }

    function exportChat() {
      const content = messages
        .map((message) => {
          const speaker = message.role === "user" ? "You" : "Midwatch";
          const time = formatTime(message.timestamp);
          return `[${time}] ${speaker}: ${message.text}`;
        })
        .join("\n\n");

      const blob = new Blob([content], {
        type: "text/plain;charset=utf-8"
      });

      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "midwatch-chat.txt";
      a.click();

      URL.revokeObjectURL(url);
    }

    async function sendMessage() {
      if (isLoading) {
        return;
      }

      const text = input.value.trim();

      if (!text) {
        return;
      }

      addMessage("user", text);

      input.value = "";
      autoResizeTextarea();
      setLoading(true);

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            messages
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Request failed");
        }

        addMessage(
          "midwatch",
          data.reply || "okay wait something broke"
        );
      } catch (err) {
        addMessage(
          "midwatch",
          "Midwatch is having trouble reaching the AI service right now."
        );

        console.error(err);
      } finally {
        setLoading(false);
      }
    }

    input.addEventListener("input", autoResizeTextarea);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    renderMessages();
    autoResizeTextarea();
  </script>
</body>
</html>
