<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Midwatch</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        sans-serif;

      background: #09090b;
      color: white;
    }

    body {
      background:
        radial-gradient(
          circle at top left,
          rgba(99, 102, 241, 0.25),
          transparent 35%
        ),
        radial-gradient(
          circle at bottom right,
          rgba(244, 114, 182, 0.12),
          transparent 35%
        ),
        #09090b;
    }

    .app {
      width: 100%;
      max-width: 860px;

      height: 100dvh;

      margin: 0 auto;

      display: flex;
      flex-direction: column;

      padding:
        max(16px, env(safe-area-inset-top))
        14px
        max(12px, env(safe-area-inset-bottom));
    }

    .header {
      flex-shrink: 0;
      padding-bottom: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;

      padding: 7px 12px;

      border-radius: 999px;

      border: 1px solid rgba(255,255,255,0.1);

      background: rgba(255,255,255,0.05);

      color: #c4b5fd;

      font-size: 12px;

      margin-bottom: 12px;
    }

    h1 {
      margin: 0;

      font-size: clamp(44px, 12vw, 72px);

      line-height: 0.92;

      letter-spacing: -0.07em;
    }

    .subtitle {
      margin-top: 14px;

      color: #a1a1aa;

      font-size: 16px;

      line-height: 1.4;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;

      margin-top: 18px;
    }

    .top-btn {
      border: 1px solid rgba(255,255,255,0.1);

      background: rgba(255,255,255,0.05);

      color: #e4e4e7;

      border-radius: 999px;

      padding: 10px 14px;

      font-size: 14px;

      cursor: pointer;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;

      margin-top: 18px;
    }

    .chip {
      border: 1px solid rgba(255,255,255,0.1);

      background: rgba(255,255,255,0.05);

      color: #d4d4d8;

      border-radius: 999px;

      padding: 9px 12px;

      font-size: 13px;

      cursor: pointer;
    }

    .chat-card {
      flex: 1;

      min-height: 0;

      display: flex;
      flex-direction: column;

      overflow: hidden;

      border-radius: 28px;

      border: 1px solid rgba(255,255,255,0.08);

      background: rgba(9,9,11,0.72);

      backdrop-filter: blur(18px);
    }

    .messages {
      flex: 1;

      min-height: 0;

      overflow-y: auto;

      padding: 18px;

      display: flex;
      flex-direction: column;

      gap: 12px;

      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .message {
      max-width: 88%;

      padding: 14px 16px;

      border-radius: 22px;

      line-height: 1.6;

      font-size: 15px;

      white-space: pre-wrap;

      overflow-wrap: anywhere;

      unicode-bidi: plaintext;

      text-align: start;

      direction: auto;
    }

    .user {
      align-self: flex-end;

      background:
        linear-gradient(
          135deg,
          #6366f1,
          #8b5cf6
        );

      border-bottom-right-radius: 8px;
    }

    .midwatch {
      align-self: flex-start;

      background: rgba(39,39,42,0.92);

      border: 1px solid rgba(255,255,255,0.06);

      border-bottom-left-radius: 8px;
    }

    .typing {
      min-height: 22px;

      padding: 0 18px 8px;

      color: #a1a1aa;

      font-size: 13px;
    }

    .composer {
      display: flex;

      gap: 10px;

      padding: 12px;

      border-top: 1px solid rgba(255,255,255,0.06);

      background: rgba(24,24,27,0.88);
    }

    input {
      flex: 1;

      min-width: 0;

      border: 1px solid rgba(255,255,255,0.1);

      background: #09090b;

      color: white;

      border-radius: 18px;

      padding: 14px 16px;

      font-size: 16px;

      outline: none;
    }

    input::placeholder {
      color: #71717a;
    }

    .send-btn {
      border: none;

      border-radius: 18px;

      padding: 0 18px;

      font-weight: 700;

      background: #f8fafc;

      color: #09090b;

      cursor: pointer;

      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      .app {
        padding-left: 10px;
        padding-right: 10px;
      }

      .subtitle {
        font-size: 15px;
      }

      .messages {
        padding: 14px;
      }

      .message {
        max-width: 92%;
        font-size: 15px;
      }

      .composer {
        padding: 10px;
      }

      .send-btn {
        padding: 0 16px;
      }
    }
  </style>
</head>

<body>

  <main class="app">

    <section class="header">

      <div class="badge">
        spoiler-aware movie night companion
      </div>

      <h1>Midwatch</h1>

      <div class="subtitle">
        For when you pause the episode and need to talk.
      </div>

      <div class="top-actions">
        <button class="top-btn" onclick="newChat()">
          New chat
        </button>

        <button class="top-btn" onclick="clearHistory()">
          Clear history
        </button>
      </div>

      <div class="chips">

        <div
          class="chip"
          onclick="quickAsk('is this man lying or am i paranoid')"
        >
          is this man lying?
        </div>

        <div
          class="chip"
          onclick="quickAsk('did i miss something or is this supposed to be unclear?')"
        >
          did i miss something?
        </div>

        <div
          class="chip"
          onclick="quickAsk('recommend something for rainy-night emotional damage')"
        >
          rainy-night recs
        </div>

      </div>

    </section>

    <section class="chat-card">

      <div id="messages" class="messages"></div>

      <div id="typing" class="typing"></div>

      <div class="composer">

        <input
          id="messageInput"
          type="text"
          placeholder="Suits, season 6..."
        />

        <button
          class="send-btn"
          onclick="sendMessage()"
        >
          Send
        </button>

      </div>

    </section>

  </main>

  <script>

    const messagesContainer =
      document.getElementById("messages");

    const input =
      document.getElementById("messageInput");

    const typing =
      document.getElementById("typing");

    let messages =
      JSON.parse(localStorage.getItem("midwatchMessages"))
      || [
        {
          role: "midwatch",
          text: "okay first of all what are we watching 👀"
        }
      ];

    function saveMessages() {
      localStorage.setItem(
        "midwatchMessages",
        JSON.stringify(messages)
      );
    }

    function renderMessages() {

      messagesContainer.innerHTML = "";

      messages.forEach((message) => {

        const div =
          document.createElement("div");

        div.className =
          `message ${message.role}`;

        div.dir = "auto";

        div.textContent =
          message.text;

        messagesContainer.appendChild(div);

      });

      messagesContainer.scrollTop =
        messagesContainer.scrollHeight;
    }

    function addMessage(role, text) {

      messages.push({
        role,
        text
      });

      saveMessages();

      renderMessages();
    }

    function newChat() {

      messages = [
        {
          role: "midwatch",
          text: "okay first of all what are we watching 👀"
        }
      ];

      saveMessages();

      renderMessages();
    }

    function clearHistory() {

      localStorage.removeItem("midwatchMessages");

      newChat();
    }

    function quickAsk(text) {
      input.value = text;
      input.focus();
    }

    async function sendMessage() {

      const text =
        input.value.trim();

      if (!text) return;

      addMessage("user", text);

      input.value = "";

      typing.textContent =
        "Midwatch is typing...";

      try {

        const response =
          await fetch("/chat", {

            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              messages
            })

          });

        const data =
          await response.json();

        typing.textContent = "";

        addMessage(
          "midwatch",
          data.reply || "okay wait something broke"
        );

      } catch (err) {

        typing.textContent = "";

        addMessage(
          "midwatch",
          "Midwatch is having trouble reaching the AI service right now."
        );

        console.error(err);
      }
    }

    input.addEventListener("keydown", (e) => {

      if (e.key === "Enter") {
        sendMessage();
      }

    });

    renderMessages();

  </script>

</body>
</html>
